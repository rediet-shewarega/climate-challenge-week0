name: CI

on:
  push:
    branches: ["main", "setup-task", "eda-*", "compare-countries", "dashboard-dev"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Display Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports
        run: |
          python -c "import pandas, numpy, matplotlib, seaborn, scipy, streamlit, plotly; print('All core imports OK')"
